services:
  polymarket_collector:
    image: ghcr.io/wanglz111/poly-valid-price:latest
    container_name: polymarket_collector
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
    entrypoint: ["python", "/app/fetch_polymarket_prices.py"]
    networks:
      - backend

  chainlink_collector:
    image: ghcr.io/wanglz111/poly-valid-price:latest
    container_name: chainlink_collector
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
    entrypoint: ["python", "/app/fetch_chainlink_reports.py"]
    networks:
      - backend

networks:
  backend:
    external: true
    name: poly_backend
